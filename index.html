<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagi Tech Import</title>
    
    <link rel="stylesheet" href="css/estilos.css">

    <!--=============== REMIXICONS - Insert link for icons ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

    
</head>


<body class="bg-violet-200 dark:bg-zinc-900 transition-colors duration-500 dark:text-white w-[90%] mx-auto overflow-x-hidden">

    <nav class="flex items-center justify-between py-6">
        <div class="shrink-0">
            <img class="w-28" src="assets/00 Logo.webp" alt="logo">
        </div>

        <section class="hidden lg:flex gap-10 font-bold uppercase text-sm tracking-widest">
            <a href="#" class="hover:text-lime-500 transition-colors">Inicio</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Categorías</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Productos</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Ofertas</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Contacto</a>
        </section>

        <div class="flex items-center gap-6 text-2xl mr-20">
            <button id="btn-menu" class="lg:hidden order-1">
                <i class="ri-menu-3-line"></i>
            </button>
            <i class="ri-search-line cursor-pointer order-2"></i>
            <i class="ri-shopping-cart-2-line cursor-pointer order-3"></i>
        </div>
    </nav>
    <!-- navegación -->


    
    <div id="mobile-menu" class="fixed inset-0 z-50 
    bg-white/10 dark:bg-black/60 backdrop-blur-3xl 
    flex flex-col items-center justify-center
    transform -translate-y-full transition-transform duration-500 ease-in-out lg:hidden">
    
    <button id="btn-close" class="absolute top-8 right-8 p-3 text-zinc-800 dark:text-white hover:rotate-90 transition-transform duration-300">
        <i class="ri-close-large-line text-4xl"></i>
    </button>

    <nav class="flex flex-col gap-6 w-[85%] max-w-md">
        <a href="#" class="group flex items-center justify-between p-5 rounded-3xl bg-white/10 border border-white/20 hover:bg-white/20 transition-all active:scale-95 shadow-xl">
            <div class="flex items-center gap-5">
                <div class="size-12 flex items-center justify-center rounded-2xl bg-lime-500 text-black shadow-[0_0_15px_rgba(132,204,22,0.5)]">
                    <i class="ri-home-4-line text-2xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Inicio</span>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </a>

        <a href="#" class="group flex items-center justify-between p-5 rounded-3xl bg-white/10 border border-white/20 hover:bg-white/20 transition-all active:scale-95 shadow-xl">
            <div class="flex items-center gap-5">
                <div class="size-12 flex items-center justify-center rounded-2xl bg-violet-500 text-white shadow-[0_0_15px_rgba(139,92,246,0.5)]">
                    <i class="ri-apps-2-line text-2xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Categorías</span>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </a>

        <a href="#" class="group flex items-center justify-between p-5 rounded-3xl bg-white/10 border border-white/20 hover:bg-white/20 transition-all active:scale-95 shadow-xl">
            <div class="flex items-center gap-5">
                <div class="size-12 flex items-center justify-center rounded-2xl bg-orange-500 text-white shadow-[0_0_15px_rgba(249,115,22,0.5)]">
                    <i class="ri-fire-line text-2xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Ofertas</span>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </a>

        <a href="#" class="group flex items-center justify-between p-5 rounded-3xl bg-white/10 border border-white/20 hover:bg-white/20 transition-all active:scale-95 shadow-xl">
            <div class="flex items-center gap-5">
                <div class="size-12 flex items-center justify-center rounded-2xl bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                    <i class="ri-customer-service-2-line text-2xl"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">Contacto</span>
            </div>
            <i class="ri-arrow-right-s-line text-2xl opacity-0 group-hover:opacity-100 transition-opacity"></i>
        </a>
    </nav>
</div>




    <button id="btn-color" class="size-12 fixed top-5 right-5 flex items-center justify-center rounded-full shadow-lg bg-zinc-800 text-white dark:bg-violet-100 dark:text-zinc-900 z-[60] transition-all active:scale-95">
        <i class="ri-moon-line text-xl dark:hidden"></i>
        <i class="ri-sun-line text-xl hidden dark:block"></i>
    </button>

    <script src="./js/app.js"></script>
</body>

</html>
