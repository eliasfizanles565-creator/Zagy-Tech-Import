<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagi Tech Import</title>
    
    <link rel="stylesheet" href="css/estilos.css">

    <!--=============== REMIXICONS - Insert link for icons ===============-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css">

    
</head>


<body class="bg-violet-200 dark:bg-zinc-900 transition-colors duration-500 dark:text-white w-[90%] mx-auto overflow-x-hidden">

    <nav class="flex items-center justify-between py-6">
        <div class="shrink-0">
            <img class="w-28" src="assets/00 Logo.webp" alt="logo">
        </div>

        <section class="hidden lg:flex gap-10 font-bold uppercase text-sm tracking-widest">
            <a href="#" class="hover:text-lime-500 transition-colors">Inicio</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Categorías</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Productos</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Ofertas</a>
            <a href="#" class="hover:text-lime-500 transition-colors">Contacto</a>
        </section>

        <div class="flex items-center gap-6 text-2xl">
            <button id="btn-menu" class="lg:hidden order-1">
                <i class="ri-menu-3-line"></i>
            </button>
            <i class="ri-search-line cursor-pointer order-2"></i>
            <i class="ri-shopping-cart-2-line cursor-pointer order-3"></i>
        </div>
    </nav>

    <div id="mobile-menu" class="fixed top-0 right-0 h-full w-64 bg-white dark:bg-zinc-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 lg:hidden">
        <div class="p-6 flex flex-col gap-6 font-semibold">
            <button id="btn-close" class="text-right text-3xl">&times;</button>
            <a href="#" class="border-b dark:border-zinc-700 pb-2">Inicio</a>
            <a href="#" class="border-b dark:border-zinc-700 pb-2">Categorías</a>
            <a href="#" class="border-b dark:border-zinc-700 pb-2">Productos</a>
            <a href="#" class="border-b dark:border-zinc-700 pb-2">Ofertas</a>
            <a href="#" class="border-b dark:border-zinc-700 pb-2">Contacto</a>
        </div>
    </div>

    <button id="btn-color" class="size-12 fixed bottom-5 right-5 flex items-center justify-center rounded-full shadow-lg bg-zinc-800 text-white dark:bg-violet-100 dark:text-zinc-900 z-[60] transition-all active:scale-95">
        <i class="ri-moon-line text-xl dark:hidden"></i>
        <i class="ri-sun-line text-xl hidden dark:block"></i>
    </button>

    <script src="./js/app.js"></script>
</body>

</html>
